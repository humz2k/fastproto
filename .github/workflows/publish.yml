name: Publish to PyPI

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Install fastproto
        run: python -m pip install -e .

      - name: Check package version matches tag
        run: |
          python - <<'PY'
          import os
          from importlib.metadata import version

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:] if tag.startswith("v") else tag
          actual = version("fastproto-compiler")
          if actual != expected:
              raise SystemExit(
                  f"package version {actual!r} does not match tag {tag!r}"
              )
          print(f"Publishing fastproto-compiler {actual}")
          PY

      - name: Run tests
        run: python -m unittest discover

      - name: Check CLI entry point
        run: fastproto --version

      - name: Build package
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist/

  publish:
    name: Publish distribution
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/p/fastproto-compiler

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
